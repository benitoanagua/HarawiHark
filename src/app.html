<!doctype html>
<html lang="%paraglide.lang%">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		
		<!-- Script para prevenir flash de tema incorrecto -->
		<script>
			(function() {
				try {
					// Intentar obtener el tema guardado
					const savedTheme = localStorage.getItem('theme');
					
					let theme;
					if (savedTheme && (savedTheme === 'light' || savedTheme === 'dark')) {
						theme = savedTheme;
					} else {
						// Si no hay tema guardado, usar las preferencias del sistema
						theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
					}
					
					// Aplicar el tema inmediatamente
					document.documentElement.setAttribute('data-theme', theme);
					document.documentElement.classList.add(theme);
				} catch (e) {
					// En caso de error, usar tema claro por defecto
					document.documentElement.setAttribute('data-theme', 'light');
					document.documentElement.classList.add('light');
				}
			})();
		</script>

		<!-- Habilitar View Transitions -->
		<style>
			@view-transition {
				navigation: auto;
			}
			
			/* Transición por defecto */
			::view-transition-old(root),
			::view-transition-new(root) {
				animation-duration: 0.3s;
			}
			
			::view-transition-old(root) {
				animation-name: slide-out-to-left;
			}
			
			::view-transition-new(root) {
				animation-name: slide-in-from-right;
			}
			
			@keyframes slide-out-to-left {
				to {
					transform: translateX(-100%);
				}
			}
			
			@keyframes slide-in-from-right {
				from {
					transform: translateX(100%);
				}
			}
		</style>
		
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
